<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>X Asteroids</title>
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            touch-action: none; -webkit-user-select: none; user-select: none; 
        }
        canvas { display: block; }
        
        #header { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; }
        #header h1 { margin: 0; font-size: 36px; letter-spacing: 5px; color: #fff; text-transform: uppercase; }
        #header p { margin: 10px 0; font-size: 16px; color: #fff; font-weight: bold; }

        #score-ui { position: absolute; top: 25px; left: 25px; font-size: 28px; color: #fff; pointer-events: none; }
        #lives-ui { position: absolute; top: 65px; left: 25px; pointer-events: none; }
        
        #high-ui { position: absolute; top: 25px; right: 25px; text-align: right; font-size: 18px; color: #fff; pointer-events: none; }
        #score-list { margin-top: 5px; font-size: 20px; }
        
        #reset-btn { pointer-events: auto; cursor: pointer; text-decoration: underline; font-size: 16px; margin-top: 10px; display: inline-block; color: #fff; }

        #msg {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; display: none; background: #000; padding: 30px; border: 3px solid #fff; z-index: 100; color: #fff;
        }

        #controls { 
            position: absolute; bottom: 50px; left: 0; width: 100%; 
            display: none; justify-content: space-between; padding: 0 40px; 
            box-sizing: border-box; pointer-events: none; 
        }
        
        .btn { 
            width: 90px; height: 90px; border: 3px solid #fff; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            background: transparent; font-size: 14px; font-weight: bold; color: #fff;
            pointer-events: auto;
        }
        .btn:active { background: #fff; color: #000; }

        @media (max-width: 1200px) {
            #controls { display: flex; }
            #header p { display: none; } 
        }

        footer { position: absolute; bottom: 15px; width: 100%; text-align: center; pointer-events: auto; }
        footer a { color: #fff; text-decoration: none; font-size: 18px; font-weight: bold; border-bottom: 2px solid #fff; }
        
        .blink { animation: b 1s infinite; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="header">
        <h1>X Asteroids</h1>
        <p>Turn = Left/Right Arrow | Thrust = Up Arrow | Fire = Space | Hyperspace = Shift</p>
    </div>

    <div id="score-ui">Score: <span id="cur-score">0</span></div>
    <div id="lives-ui"></div>
    <div id="high-ui">
        High Score
        <div id="score-list"></div>
        <div id="reset-btn" onclick="resetScores()">Reset</div>
    </div>
    
    <div id="msg">
        <h1 id="m-title" style="font-size: 45px; margin-bottom: 10px;">Game Over!</h1>
        <div id="name-prompt" style="display:none;">
            <div style="font-size: 22px; margin-bottom: 10px;">New high score!</div>
            <div style="font-size: 32px;">Initials: <span id="name-in" class="blink"></span></div>
        </div>
        <p id="restart-hint" style="font-size: 18px; margin-top: 20px;">Press Fire/Space to Restart</p>
    </div>

    <div id="controls">
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="btn" id="b-l">Left</div>
            <div class="btn" id="b-r">Right</div>
            <div class="btn" id="b-h" style="width: 75px; height: 75px;">Hyp</div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; gap: 25px;">
            <div class="btn" id="b-u">Thrust</div>
            <div class="btn" id="b-f" style="width: 110px; height: 110px;">Fire</div>
        </div>
    </div>

    <footer><a href="https://bix.pages.dev" target="_blank">bix.pages.dev</a></footer>
    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById("g"), ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("cur-score"), msgEl = document.getElementById("msg");
    const nameEl = document.getElementById("name-in"), listEl = document.getElementById("score-list"), livesEl = document.getElementById("lives-ui");
    const namePrompt = document.getElementById("name-prompt"), restartHint = document.getElementById("restart-hint");

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    let score, lives, ship, roids, lasers, gameActive, pName, invuln, enteringName;
    const defaultScores = [{n:"BIX", s:5000}, {n:"AST", s:3000}, {n:"VEC", s:1000}, {n:"OLD", s:500}, {n:"ACE", s:100}];
    let highScores = JSON.parse(localStorage.getItem("ast_scores")) || defaultScores;

    function resetScores() { if (confirm("Really Reset Scores?")) { localStorage.removeItem("ast_scores"); location.reload(); } }

    function init() {
        score = 0; lives = 3; pName = ""; gameActive = true; enteringName = false; lasers = [];
        scoreEl.innerText = score; msgEl.style.display = "none";
        namePrompt.style.display = "none"; restartHint.style.display = "block";
        resetShip();
        roids = []; for(let i=0; i<5; i++) spawnRoid();
        renderScores(); updateLivesUI();
    }

    function resetShip() {
        ship = { x: canvas.width/2, y: canvas.height/2, r: 13, a: Math.PI/2, rot: 0, th: false, t: {x:0, y:0} };
        invuln = 100;
    }

    function updateLivesUI() {
        livesEl.innerHTML = "";
        for(let i=0; i<lives; i++) livesEl.innerHTML += `<svg width="24" height="24" style="margin-right:8px"><path d="M12 4 L20 20 L12 16 L4 20 Z" fill="none" stroke="white" stroke-width="2"/></svg>`;
    }

    function spawnRoid(x, y, r = 45) {
        let rx = x ?? Math.random() * canvas.width, ry = y ?? Math.random() * canvas.height;
        if (!x && Math.hypot(ship.x - rx, ship.y - ry) < 150) return spawnRoid();
        roids.push({ x: rx, y: ry, r: r, xv: (Math.random()-0.5)*2.5, yv: (Math.random()-0.5)*2.5, v: Math.floor(Math.random()*3+8), off: Array.from({length:12}, () => Math.random()*0.5+0.75) });
    }

    function shoot() { if (!gameActive) return; lasers.push({ x: ship.x + 16*Math.cos(ship.a), y: ship.y - 16*Math.sin(ship.a), xv: 10*Math.cos(ship.a), yv: -10*Math.sin(ship.a), life: 75 }); }

    function triggerHyper() { if(Math.random() < 0.1) loseLife(); else { ship.x = Math.random()*canvas.width; ship.y = Math.random()*canvas.height; ship.t = {x:0,y:0}; } }

    const bind = (id, fnStart, fnEnd) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); fnStart(); }, {passive: false});
        if(fnEnd) el.addEventListener('touchend', (e) => { e.preventDefault(); fnEnd(); }, {passive: false});
    };

    bind('b-l', () => ship.rot = 0.08, () => ship.rot = 0);
    bind('b-r', () => ship.rot = -0.08, () => ship.rot = 0);
    bind('b-u', () => ship.th = true, () => ship.th = false);
    bind('b-h', () => triggerHyper());
    bind('b-f', () => { if(!gameActive && !enteringName) init(); else shoot(); });

    window.onkeydown = (e) => {
        if (gameActive) {
            if (e.code === "ArrowLeft") ship.rot = 0.08;
            if (e.code === "ArrowRight") ship.rot = -0.08;
            if (e.code === "ArrowUp") ship.th = true;
            if (e.code === "Space") { e.preventDefault(); shoot(); }
            if (e.key === "Shift") triggerHyper();
        } else if (enteringName) {
            if (e.key.length === 1 && pName.length < 3 && /[a-z0-9]/i.test(e.key)) {
                pName += e.key.toUpperCase(); nameEl.innerText = pName;
                if (pName.length === 3) {
                    highScores.push({n:pName, s:score});
                    highScores.sort((a,b)=>b.s-a.s);
                    highScores = highScores.slice(0,5);
                    localStorage.setItem("ast_scores", JSON.stringify(highScores));
                    renderScores();
                    enteringName = false;
                    restartHint.style.display = "block";
                }
            }
        } else if (e.code === "Space") init();
    };
    window.onkeyup = (e) => { if(e.code === "ArrowLeft" || e.code === "ArrowRight") ship.rot = 0; if(e.code === "ArrowUp") ship.th = false; };

    function loseLife() {
        lives--; updateLivesUI();
        if (lives <= 0) {
            gameActive = false;
            msgEl.style.display = "block";
            if (score > highScores[highScores.length-1].s) {
                enteringName = true;
                namePrompt.style.display = "block";
                restartHint.style.display = "none";
                pName = ""; nameEl.innerText = "";
            }
        } else resetShip();
    }

    function renderScores() { listEl.innerHTML = highScores.map(s => `<div>${s.n} ${s.s}</div>`).join(''); }

    function loop() {
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;

        if (gameActive) {
            if (invuln > 0) invuln--;
            ship.a += ship.rot;
            if (ship.th) { ship.t.x += 0.15 * Math.cos(ship.a); ship.t.y -= 0.15 * Math.sin(ship.a); } 
            else { ship.t.x *= 0.985; ship.t.y *= 0.985; }
            ship.x += ship.t.x; ship.y += ship.t.y;
            if(ship.x<0) ship.x=canvas.width; else if(ship.x>canvas.width) ship.x=0;
            if(ship.y<0) ship.y=canvas.height; else if(ship.y>canvas.height) ship.y=0;
            if (invuln === 0 || Math.floor(invuln/5)%2===0) {
                ctx.beginPath();
                ctx.moveTo(ship.x + 16*Math.cos(ship.a), ship.y - 16*Math.sin(ship.a)); 
                ctx.lineTo(ship.x - 14*(Math.cos(ship.a)+0.8*Math.sin(ship.a)), ship.y + 14*(Math.sin(ship.a)-0.8*Math.cos(ship.a))); 
                ctx.lineTo(ship.x - 7*Math.cos(ship.a), ship.y + 7*Math.sin(ship.a)); 
                ctx.lineTo(ship.x - 14*(Math.cos(ship.a)-0.8*Math.sin(ship.a)), ship.y + 14*(Math.sin(ship.a)+0.8*Math.cos(ship.a))); 
                ctx.closePath(); ctx.stroke();
            }
        }
        for (let i = lasers.length-1; i>=0; i--) {
            let l = lasers[i]; l.x += l.xv; l.y += l.yv; l.life--;
            if(l.x<0) l.x=canvas.width; else if(l.x>canvas.width) l.x=0;
            if(l.y<0) l.y=canvas.height; else if(l.y>canvas.height) l.y=0;
            ctx.fillStyle = "#fff"; ctx.fillRect(l.x, l.y, 3, 3);
            if (l.life <= 0) lasers.splice(i,1);
        }
        for (let i = roids.length-1; i>=0; i--) {
            let r = roids[i]; r.x += r.xv; r.y += r.yv;
            if(r.x < -r.r) r.x = canvas.width+r.r; else if(r.x > canvas.width+r.r) r.x = -r.r;
            if(r.y < -r.r) r.y = canvas.height+r.r; else if(r.y > canvas.height+r.r) r.y = -r.r;
            ctx.beginPath(); ctx.moveTo(r.x + r.r*r.off[0]*Math.cos(0), r.y + r.r*r.off[0]*Math.sin(0));
            for(let j=1; j<r.v; j++) ctx.lineTo(r.x + r.r*r.off[j]*Math.cos(j*Math.PI*2/r.v), r.y + r.r*r.off[j]*Math.sin(j*Math.PI*2/r.v));
            ctx.closePath(); ctx.stroke();
            if (gameActive && invuln === 0 && Math.hypot(ship.x-r.x, ship.y-r.y) < r.r + 5) loseLife();
            for (let j=lasers.length-1; j>=0; j--) {
                if (Math.hypot(lasers[j].x-r.x, lasers[j].y-r.y) < r.r) {
                    if (r.r > 15) { spawnRoid(r.x, r.y, r.r/2); spawnRoid(r.x, r.y, r.r/2); }
                    roids.splice(i,1); lasers.splice(j,1); score += 100; scoreEl.innerText = score;
                    if(roids.length === 0) for(let k=0; k<5; k++) spawnRoid();
                    break;
                }
            }
        }
        requestAnimationFrame(loop);
    }
    init(); loop();
</script>
</body>
</html>
