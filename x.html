<style>
/* ---------- base ---------- */
body {
  margin: 16px;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  line-height: 1.6;
  max-width: 900px;
}
h1 {
  font-size: clamp(3.5rem, 12vw, 6rem);
  margin: 0;
}
/* original h3 style – now reused for h2 (as requested) */
h2 {
  font-size: clamp(2rem, 5vw, 2rem);
  margin: 0;
  line-height: 1.5;
}
h3 {
  /* kept only for semantic fallback, but not used in main content */
  font-size: clamp(1.1rem, 5vw, 1.4rem);
  margin: 1.8em 0;
}
p {
  font-size: clamp(1.2rem, 2.8vw, 1rem); /* adjusted min to be readable */
  margin: 1em 0;
}
a, a:visited, a:hover, a:active, a:focus {
  color: #2E2EFF;
  text-decoration: none;
  font-weight: 700;
  font-size: inherit;
}
h1 a, h2 a, h3 a {
  font-size: inherit;
  font-weight: inherit;
  color: #2E2EFF;
}

/* image block – now directly under title, no columns */
.title-image-block {
  margin: 1.5rem 0 2rem 0;  /* spacing after h1, before next elements */
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 24px;
}
.profile-pic {
  width: 210px;
  height: 210px;
  border-radius: 0;        /* keep original style (square) */
  object-fit: cover;
}
.profile-text p {
  margin: 0;
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 600;
  line-height: 1.3;
  color: #fff;
}
/* simple separate line: Jan Klein, Researcher */
.profile-text strong {
  color: #fff;
  font-weight: 700;
  font-size: clamp(1.5rem, 4vw, 2rem);
  white-space: nowrap;
}
/* make sure the inline text stays simple */
.title-image-block {
  align-items: baseline;
}
/* optional: if screen gets very small, stack nicely */
@media (max-width: 500px) {
  .title-image-block {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
}

/* ----- logos row (unchanged) ----- */
.logos img {
  height: 100px;
  margin-right: 5px;
}

/* footer (unchanged) */
footer h2, footer p {
  margin: 0;
  line-height: 2;
}
footer h2 {
  font-size: clamp(2rem, 5vw, 2rem); /* keep same as h2 */
  margin: 0;
}
/* remove any leftover list or img-row styles from previous version */
.img-row, .list, .img-row .list {
  display: none;  /* completely hide the old column/list structure */
}
</style>
</head>

    </div>
